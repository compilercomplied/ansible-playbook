---
# ==============================================================================
# CLI Overridable Configuration (Use -e "var_name=value")
# ==============================================================================
is_gui_enabled: true
install_docker: true
target_user: gdario

# Privilege escalation for user-space tasks (disabled on macOS/Darwin where we run as target user)
user_become: "{{ ansible_os_family != 'Darwin' }}"

# System Configuration Options
configure_touchid_sudo: false

# Dynamically resolve home directory if not overridden
home_dir: "{{ '/Users/' ~ target_user if ansible_os_family == 'Darwin' else '/home/' ~ target_user }}"

# ==============================================================================
# System Defaults
# ==============================================================================
debian_mirror: "deb.debian.org"
debian_release: "testing"

# Package Categories
core_packages:
  - ripgrep
  - git
  - curl
  - unzip

programming_languages:
  rust: stable

user_packages:
  - bat
  - glow
  - jq
  - kubectl
  - kubectx
  - make
  - sqlite3
  - tree
  - tree-sitter-cli
  - zellij
  - dnsmasq
