---
# ==============================================================================
# Tasks for configuring passive/silent fancontrol on cluster nodes
# ==============================================================================

- name: Install lm-sensors and fancontrol packages
  ansible.builtin.apt:
    name:
      - lm-sensors
      - fancontrol
    state: present
    update_cache: yes

- name: Configure sensors kernel modules to load on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/sensors.conf
    content: |
      coretemp
      nct6775
    mode: '0644'
  register: modules_config

- name: Load sensor kernel modules immediately if changed
  ansible.builtin.command:
    cmd: "modprobe {{ item }}"
  loop:
    - coretemp
    - nct6775
  when: modules_config.changed
  changed_when: true

- name: Deploy dynamic fancontrol configuration helper script
  ansible.builtin.template:
    src: generate-fancontrol-config.sh.j2
    dest: /usr/local/bin/generate-fancontrol-config.sh
    mode: '0755'
  register: helper_script

- name: Deploy fancontrol-config helper systemd service
  ansible.builtin.template:
    src: fancontrol-config.service.j2
    dest: /etc/systemd/system/fancontrol-config.service
    mode: '0644'
  register: helper_service

- name: Reload systemd daemon if service template changed
  ansible.builtin.systemd:
    daemon_reload: yes
  when: helper_service.changed or helper_script.changed

- name: Enable and start fancontrol-config helper service
  ansible.builtin.systemd:
    name: fancontrol-config
    enabled: yes
    state: started
  register: config_run

- name: Force run dynamic config generator if script changed
  ansible.builtin.command:
    cmd: /usr/local/bin/generate-fancontrol-config.sh
  when: helper_script.changed or config_run.changed
  register: force_gen
  changed_when: true

- name: Ensure fancontrol service is enabled and started/restarted
  ansible.builtin.systemd:
    name: fancontrol
    enabled: yes
    state: restarted
  when: helper_script.changed or helper_service.changed or config_run.changed or force_gen.changed

- name: Ensure fancontrol service is running and enabled
  ansible.builtin.systemd:
    name: fancontrol
    enabled: yes
    state: started
