---
- name: Check if Claude Code is installed
  ansible.builtin.stat:
    path: "{{ home_dir }}/.local/bin/claude"
  register: claude_check

- name: Install Global AI Tools (Claude Code)
  become: "{{ user_become }}"
  become_user: "{{ target_user }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      export PATH="$HOME/.local/bin:$PATH"
      curl -fsSL https://claude.ai/install.sh | bash
    executable: /bin/bash
  when: not claude_check.stat.exists

- name: Check if Antigravity CLI is installed
  ansible.builtin.stat:
    path: "{{ home_dir }}/.local/bin/agy"
  register: antigravity_check

- name: Install Global AI Tools (Antigravity CLI)
  become: "{{ user_become }}"
  become_user: "{{ target_user }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      export PATH="$HOME/.local/bin:$PATH"
      curl -fsSL https://antigravity.google/cli/install.sh | bash
    executable: /bin/bash
  when: not antigravity_check.stat.exists

- name: Check if Github Copilot is installed
  ansible.builtin.shell: |
    export PATH="{{ home_dir }}/.fnm:$PATH"
    eval "`fnm env`"
    npm list -g @github/copilot
  register: copilot_check
  failed_when: false
  changed_when: false

- name: Install GitHub Copilot CLI
  become: "{{ user_become }}"
  become_user: "{{ target_user }}"
  ansible.builtin.shell:
    cmd: |
      export PATH="{{ home_dir }}/.fnm:$PATH"
      eval "`fnm env`"
      npm install -g @github/copilot
    executable: /bin/bash
  when: copilot_check.rc != 0
