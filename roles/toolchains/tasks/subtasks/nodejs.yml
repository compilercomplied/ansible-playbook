---
- name: Check if fnm is installed
  ansible.builtin.stat:
    path: "{{ fnm_bin_path }}"
  register: fnm_check

- name: Download fnm installer
  ansible.builtin.get_url:
    url: https://fnm.vercel.app/install
    dest: /tmp/install_fnm.sh
    mode: '0755'
  when: not fnm_check.stat.exists

- name: Install fnm
  become: yes
  become_user: "{{ target_user }}"
  ansible.builtin.shell: /tmp/install_fnm.sh --install-dir "{{ fnm_bin_path | dirname }}" --skip-shell
  when: not fnm_check.stat.exists

- name: Configure fnm in .bashrc
  ansible.builtin.blockinfile:
    path: "{{ home_dir }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK (FNM)"
    create: yes
    block: |
      export PATH="{{ fnm_bin_path | dirname }}:$PATH"
      eval "`fnm env`"
    owner: "{{ target_user }}"

- name: Configure fnm in .profile
  ansible.builtin.blockinfile:
    path: "{{ home_dir }}/.profile"
    marker: "# {mark} ANSIBLE MANAGED BLOCK (FNM)"
    create: yes
    block: |
      export PATH="{{ fnm_bin_path | dirname }}:$PATH"
      eval "`fnm env`"
    owner: "{{ target_user }}"

- name: Configure fnm in Staged Nushell Env
  ansible.builtin.blockinfile:
    path: "{{ home_dir }}/.ansible_nushell_env.nu"
    marker: "# {mark} ANSIBLE MANAGED BLOCK (FNM)"
    create: yes
    block: |
      $env.PATH = ($env.PATH | prepend ("{{ fnm_bin_path | dirname }}"))
      # Initialize fnm for nushell
      ^("{{ fnm_bin_path }}") env --json | from json | load-env
    owner: "{{ target_user }}"

- name: Check if Node is installed
  ansible.builtin.shell: |
    export PATH="{{ fnm_bin_path | dirname }}:$PATH"
    eval "`fnm env`"
    node --version
  register: node_check
  failed_when: false
  changed_when: false

- name: Install Latest Node via fnm
  become: yes
  become_user: "{{ target_user }}"
  ansible.builtin.shell: |
    export PATH="{{ fnm_bin_path | dirname }}:$PATH"
    eval "`fnm env`"
    fnm install --latest
    fnm default latest
  args:
    executable: /bin/bash
  when: node_check.rc != 0
