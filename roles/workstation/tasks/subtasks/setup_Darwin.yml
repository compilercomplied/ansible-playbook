---
- name: Install Homebrew Core Packages (macOS)
  community.general.homebrew:
    name: "{{ core_packages + (user_packages | default([])) }}"
    state: present
    update_homebrew: yes
  check_mode: no

- name: Enable Touch ID for sudo (macOS Sonoma+)
  become: yes
  ansible.builtin.blockinfile:
    path: /etc/pam.d/sudo_local
    create: yes
    owner: root
    group: wheel
    mode: '0644'
    block: |
      # Managed by Ansible - Enable Touch ID for sudo
      auth       optional       /opt/homebrew/lib/pam/pam_reattach.so
      auth       sufficient     pam_tid.so
  when: ansible_facts['os_family'] == 'Darwin'

- name: Ensure .config directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config"
    state: directory
    mode: '0755'
  # No owner/group specified to avoid chown calls on macOS local runs

- name: Clone Secrets Repo
  become: yes
  become_user: "{{ target_user }}"
  ansible.builtin.git:
    repo: 'git@github.com:compilercomplied/secrets.git'
    dest: "{{ home_dir }}/secrets"
    version: master
    accept_hostkey: yes
    force: yes
  check_mode: no
